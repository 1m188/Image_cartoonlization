name: Build (.NET)

on:
  workflow_dispatch:

jobs:
  build:
    name: Build - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            rid: linux-x64
            artifact_name: image-cartoonlization-linux-amd64
            binary_name: ImageCartoonlization
          - os: windows-latest
            rid: win-x64
            artifact_name: image-cartoonlization-windows-amd64
            binary_name: ImageCartoonlization.exe
          - os: macos-latest
            rid: osx-arm64
            artifact_name: image-cartoonlization-darwin-arm64
            binary_name: ImageCartoonlization

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish (AOT)
        run: dotnet publish -r ${{ matrix.rid }} -c Release --self-contained
        working-directory: cs/ImageCartoonlization

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: cs/ImageCartoonlization/bin/Release/net10.0/${{ matrix.rid }}/publish/${{ matrix.binary_name }}
